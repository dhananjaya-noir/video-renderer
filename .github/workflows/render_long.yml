name: Render Long Format Video

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Unique run ID from n8n'
        required: true
        type: string
      audio_url:
        description: 'Public URL of audio file (from file.io)'
        required: true
        type: string
      duration:
        description: 'Estimated duration in seconds'
        required: true
        type: string
      srt_content:
        description: 'SRT subtitle content (JSON-encoded string)'
        required: true
        type: string
      video_mode:
        description: 'Video mode (longformat)'
        required: false
        default: 'longformat'
        type: string
      aspect_ratio:
        description: 'Aspect ratio (16x9)'
        required: false
        default: '16x9'
        type: string
      pacing:
        description: 'Pacing style (cinematic)'
        required: false
        default: 'cinematic'
        type: string

jobs:
  render-long:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick
          pip install requests pillow

      - name: Download audio
        run: |
          mkdir -p workspace
          curl -L "${{ github.event.inputs.audio_url }}" -o workspace/audio.mp3
          echo "Audio downloaded: $(du -h workspace/audio.mp3 | cut -f1)"

      - name: Write SRT file
        run: |
          python3 -c "
          import json, sys
          srt = json.loads(sys.argv[1])
          with open('workspace/subs.srt', 'w') as f:
              f.write(srt)
          print('SRT written:', len(srt), 'chars')
          " '${{ github.event.inputs.srt_content }}'

      - name: Generate cinematic background
        run: |
          python3 << 'EOF'
          from PIL import Image, ImageDraw, ImageFont
          import math

          W, H = 1920, 1080  # Long format: 16:9
          img = Image.new('RGB', (W, H), (0, 0, 0))
          draw = ImageDraw.Draw(img)

          # Deep violet radial atmosphere
          cx, cy = W // 2, H // 2
          for r in range(max(W, H), 0, -15):
              ratio = r / max(W, H)
              g_val = int(10 * (1 - ratio))
              b_val = int(30 * (1 - ratio) * 0.6)
              alpha_est = max(0, int(60 * (1 - ratio)))
              draw.ellipse(
                  [cx - r, cy - r, cx + r, cy + r],
                  outline=(int(124 * (1 - ratio * 0.7)), g_val, b_val),
                  width=2
              )

          # Circuit-like lines
          for x in range(0, W, 120):
              draw.line([(x, 0), (x, H)], fill=(30, 10, 60), width=1)
          for y in range(0, H, 120):
              draw.line([(0, y), (W, y)], fill=(30, 10, 60), width=1)

          # Violet accent bars
          draw.rectangle([0, 0, W, 8], fill=(124, 58, 237))
          draw.rectangle([0, H-8, W, H], fill=(124, 58, 237))

          # NeuroStripped top watermark
          try:
              font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 48)
          except:
              font = ImageFont.load_default()
          draw.text((W//2, 60), "NEUROSTRIPPED", font=font, fill=(124, 58, 237), anchor="mm")

          img.save('workspace/bg.png')
          print("Cinematic background generated.")
          EOF

      - name: Render long-format video with FFmpeg (16:9)
        run: |
          DURATION="${{ github.event.inputs.duration }}"
          ffmpeg -y \
            -loop 1 -i workspace/bg.png \
            -i workspace/audio.mp3 \
            -vf "subtitles=workspace/subs.srt:force_style='Fontname=Arial Black,FontSize=14,PrimaryColour=&Hffffff,OutlineColour=&H000000,Outline=3,Bold=1,Alignment=2,MarginV=60'" \
            -c:v libx264 -preset fast -crf 18 \
            -c:a aac -b:a 256k \
            -pix_fmt yuv420p \
            -t "$DURATION" \
            -shortest \
            -movflags +faststart \
            "workspace/video_long_${{ github.event.inputs.run_id }}.mp4"
          echo "Long render complete: $(du -h workspace/video_long_*.mp4 | cut -f1)"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.run_id }}
          path: workspace/video_long_*.mp4
          retention-days: 1
